<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- daisy Ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#F4F5F7] h-[100vh] flex flex-col justify-center items-center ">
    <div class="h-[130px] w-[300px] bg-[url(./assets/bg.png)] bg-cover flex justify-center items-center">
        <img src="./assets/Group.png" alt="">
    </div>
    <form action="" class="w-[350px] rounded-2xl p-6 bg-white">
        <div class="">
            <label for="" class="font-semibold">Mobile Number</label> <br>
            <input type="text" placeholder="Enter Your Number" id="mobile-number" class="input bg-[#F4F5F7] mt-3 rounded-2xl" />
        </div>
        <div class="mt-5">
            <label for="" class="font-semibold">4 Digit Pin</label> <br>
            <input type="text" placeholder="Enter 4 Digit Pin" id="pin-number" class="input bg-[#F4F5F7] mt-3 rounded-2xl" />
        </div>
        <button class="btn bg-[#0874F2] mt-5 w-full rounded-2xl text-white" id="loginButton">Login</button>
    </form>


    <!-- js scripts -->
    <script src="./script.js"></script>
</body>
</html>
