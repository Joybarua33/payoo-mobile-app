<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <!-- daisy Ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="h-[100vh] bg-[#F4F5F7]">
    <div class="max-w-lg mx-auto bg-white rounded-b-xl">
        <div class="min-h-[50px] flex justify-between items-center  border-b-1 border-gray-400 p-4">
            <div class="flex items-center">
                <img src="./assets/Group.png" class="h-[60px]" alt="">
                <div class="ml-3">
                    <h1 class="font-bold">$<span>45000</span></h1>
                    <p class="text-[#08080880]">Available Balance</p>
                </div>
            </div>
            <div>
                <button class="btn text-[#08080880]"><i class="fa-solid fa-arrow-right-from-bracket rotate-180 text-gray-700"></i>Log Out</button>
            </div>
        </div>
        <div class="mt-8 p-3">
            <h1 class="text-2xl font-bold">🔥 Welcome to Payooo!</h1>
            <p class="text-[#08080880]">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
        </div>

        <div class="min-h-[200px] grid grid-cols-3 gap-4 p-3">
            <div class="border-2 border-gray-200 rounded-xl text-center p-3">
                <img src="./assets/wallet1.png" class="mx-auto" alt="">
                <h2>Add Money</h2>
            </div>
            <div class="border-2 border-gray-200 rounded-xl text-center p-3">
                <img src="./assets/money1.png" class="mx-auto" alt="">
                <h2>Add Money</h2>
            </div>
            <div class="border-2 border-gray-200 rounded-xl text-center p-3">
                <img src="./assets//wallet1.png" class="mx-auto" alt="">
                <h2>Add Money</h2>
            </div>
            <div class="border-2 border-gray-200 rounded-xl text-center p-3">
                <img src="./assets//wallet1.png" class="mx-auto" alt="">
                <h2>Add Money</h2>
            </div>
            <div class="border-2 border-gray-200 rounded-xl text-center p-3">
                <img src="./assets//wallet1.png" class="mx-auto" alt="">
                <h2>Add Money</h2>
            </div>
            <div class="border-2 border-gray-200 rounded-xl text-center p-3">
                <img src="./assets//wallet1.png" class="mx-auto" alt="">
                <h2>Add Money</h2>
            </div>
        </div>
    </div>

    <div class="form-section max-w-lg mx-auto">
        <div>
            <h1 class="p-6 text-xl font-bold">Add Money</h1>
            <form action="" class="bg-white rounded-2xl p-8">
                <div class="mb-3">
                    <label for="" class="font-semibold">Bank Acount Number</label> <br>
                    <select class="select bg-[#f4f5f7] mt-2 rounded-3xl w-full">
                        <option disabled selected>Select Bank</option>
                        <option>AB Bank</option>
                        <option>Bank Asia</option>
                        <option>Dutch Bangla Bank</option>
                    </select>
                </div>
                <div class="mt-4">
                    <label for="" class="font-semibold">Bank Acount Number</label> <br>
                    <input type="text" placeholder="Enter 11 digit account number" class="input bg-[#F4F5F7] mt-2 rounded-2xl w-full" />
                </div>
                <div class="mt-4">
                    <label for="" class="font-semibold">Amount to Add</label> <br>
                    <input type="text" placeholder="Add Amount to withdraw"  class="input bg-[#F4F5F7] mt-2 rounded-2xl w-full" />
                </div>
                <div class="mt-4">
                    <label for="" class="font-semibold">Pin Number</label> <br>
                    <input type="text" placeholder="Enter 4 digit pin number" class="input bg-[#F4F5F7] mt-2 rounded-2xl w-full" />
                </div>
                 <button class="btn bg-[#0874F2] mt-5 w-full rounded-2xl text-white" id="loginButton">Add Money</button>
            </form>
        </div>
    </div>
</body>
</html>
